<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING DASHBOARD - GOLTOGEL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0b0f19; --card: #161b2a; --text: #ffffff; --gray: #94a3b8; --red: #ff4d4d; --green: #00ff88; --warn: #ffcc00; --line: #2d3748; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { background: var(--card); padding: 15px 25px; border-radius: 12px; border: 1px solid var(--gold); display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .brand-title { margin: 0; color: var(--gold); font-size: 1.2rem; letter-spacing: 1px; text-transform: uppercase; }
        .amount { font-size: 1.5rem; color: var(--gold); font-weight: 800; }
        .main-layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--line); }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: var(--gray); margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; background: #000; border: 1px solid var(--line); border-radius: 6px; color: #fff; box-sizing: border-box; }
        .btn-primary { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: #000; }
        .date-divider { background: rgba(212, 175, 55, 0.1); color: var(--gold); padding: 8px 15px; border-radius: 6px; margin: 20px 0 10px 0; font-weight: bold; border-left: 3px solid var(--gold); }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px; text-align: left; color: var(--gold); font-size: 11px; border-bottom: 2px solid var(--line); text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid var(--line); font-size: 13px; }
        .status-select { background: transparent; border: 1px solid var(--line); color: inherit; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
    <div class="header-left">
        <img src="https://omagad.xyz/goltogel/logo/goltogel-logo-header.png" alt="GOLTOGEL" style="height: 45px; width: auto; object-fit: contain;">
        <h2 class="brand-title">BUY & FREE SPIN</h2>
    </div>
    <div style="text-align:right">
        <small style="color:var(--gray); font-size: 10px;">PAYOUT HARI INI</small>
        <div class="amount" id="global-payout">Rp 0</div>
    </div>
</header>

    <div class="main-layout">
        <aside class="card">
            <form id="claimForm">
                <div class="form-group"><label>USER ID</label><input type="text" id="uid" required></div>
                <div class="form-group">
                    <label>EVENT</label>
                    <select id="evtType" onchange="runCalc()">
                        <option value="fs">FREE SPIN (20%)</option>
                        <option value="bs">BUY SPIN (25%)</option>
                    </select>
                </div>
                <div style="display:flex; gap:10px;">
                    <div class="form-group" style="flex:1"><label>TOTAL MENANG</label><input type="number" id="win" oninput="runCalc()" required></div>
                    <div class="form-group" style="flex:1"><label>BETTINGAN</label><input type="number" id="bet" oninput="runCalc()" required></div>
                </div>
                <div id="bs-extra" style="display:none;" class="form-group"><label>SUPER SCATTER</label><input type="number" id="scat" value="0" oninput="runCalc()"></div>
                
                <div style="text-align:center; padding:15px; border:1px dashed var(--gold); border-radius:8px; margin-bottom:15px;">
                    <small style="color:var(--gray)">BONUS</small>
                    <div id="live-bonus" style="font-size:1.2rem; font-weight:bold; color:var(--gold)">Rp 0</div>
                </div>

                <div class="form-group"><label>ID TIKET</label><input type="text" id="period" required></div>
                <button type="submit" id="btnSubmit" class="btn-primary">SIMPAN DATA</button>
            </form>
        </aside>

        <main>
            <div class="card"><input type="text" id="src" placeholder="Cari User ID..." onkeyup="render()"></div>
            <div id="list"></div>
        </main>
    </div>
</div>

<script>
    // MASUKKAN CONFIG FIREBASE ANDA
    const firebaseConfig = {
        apiKey: "ISI_API_KEY",
        databaseURL: "ISI_DATABASE_URL",
        projectId: "ISI_PROJECT_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('king_db');
    let db = [];

    // Logika Perhitungan Bonus
    function runCalc() {
        const t = document.getElementById('evtType').value;
        const w = parseFloat(document.getElementById('win').value) || 0;
        const b = parseFloat(document.getElementById('bet').value) || 0;
        const s = parseFloat(document.getElementById('scat').value) || 0;
        document.getElementById('bs-extra').style.display = (t === 'bs') ? 'block' : 'none';
        
        // RUMUS: (Win - Bet - Super Scatter) * 25% (untuk Buy Spin)
        let bonus = (t === 'fs') ? (w * 0.2) : Math.max(0, (w - b - s) * 0.25);
        document.getElementById('live-bonus').innerText = "Rp " + Math.floor(bonus).toLocaleString('id-ID');
        return bonus;
    }

    // Mengambil & Menampilkan Data
    dbRef.on('value', (snap) => {
        db = snap.val() ? Object.values(snap.val()) : [];
        render();
        updateTotal();
    });

    document.getElementById('claimForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const id = Date.now();
        dbRef.child(id).set({
            id, u: document.getElementById('uid').value.toUpperCase(),
            bonus: runCalc(), p: document.getElementById('period').value,
            s: 'Waiting', d: new Date().toLocaleDateString('id-ID'), t: id
        });
        document.getElementById('claimForm').reset();
    });

    function render() {
        const cont = document.getElementById('list');
        cont.innerHTML = '';
        db.sort((a,b) => b.t - a.t).forEach(i => {
            cont.innerHTML += `<tr><td>${i.u}</td><td>${i.bonus.toLocaleString()}</td><td>${i.s}</td></tr>`;
        });
    }

    function updateTotal() {
        const total = db.filter(i => i.s === 'Done').reduce((s, i) => s + i.bonus, 0);
        document.getElementById('global-payout').innerText = "Rp " + total.toLocaleString();
    }

    function upd(id, val) { dbRef.child(id).update({s: val}); }
</script>
</body>
</html>
